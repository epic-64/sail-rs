      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.35" stop-color="#bfeef0" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#bfeef0" stop-opacity="0"/>
