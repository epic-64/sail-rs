<svg xmlns="http://www.w3.org/2000/svg" width="200" height="160" viewBox="0 0 200 160">
  <defs>
    <linearGradient id="sw-hull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a4f29"/>
      <stop offset="1" stop-color="#4a2f17"/>
    </linearGradient>
  </defs>
  <!-- broken, half-buried hull, listing to starboard -->
  <path fill="url(#sw-hull)" d="M10,150
    C8,120 30,108 70,104 L156,96
    C176,96 188,110 182,128 C176,146 150,150 120,150 Z"/>
  <!-- deck shadow / open interior -->
  <path fill="#2c1c0e" fill-opacity="0.55" d="M70,104 L156,96 C172,96 182,106 180,120 L88,124 C76,118 70,110 70,104 Z"/>
  <!-- hull planking lines -->
  <g stroke="#3a2512" stroke-width="2" fill="none" opacity="0.6">
    <path d="M22,134 C70,126 130,124 178,126"/>
    <path d="M28,146 C76,140 128,140 170,142"/>
  </g>
  <!-- a couple of broken rib timbers jutting up -->
  <path fill="#5e3a1c" d="M74,104 L70,60 L80,60 L82,104 Z"/>
  <path fill="#5e3a1c" d="M104,100 L102,52 L112,52 L114,100 Z"/>
  <!-- snapped mast leaning across the wreck -->
  <path d="M112,56 L182,30" stroke="#6e451f" stroke-width="9" stroke-linecap="round" fill="none"/>
  <!-- tattered sail rag on the mast -->
  <path fill="#cfc6b2" fill-opacity="0.85" d="M138,46 L168,34 L166,52 L150,58 Z"/>
</svg>
