<svg xmlns="http://www.w3.org/2000/svg" width="260" height="180" viewBox="0 0 260 180">
  <defs>
    <linearGradient id="r-rock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b919b"/>
      <stop offset="0.6" stop-color="#5f6470"/>
      <stop offset="1" stop-color="#454a56"/>
    </linearGradient>
    <linearGradient id="r-grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5bbf72"/>
      <stop offset="1" stop-color="#2f8f4e"/>
    </linearGradient>
    <radialGradient id="r-shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#06303a" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#06303a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- water-contact shadow -->
  <ellipse cx="130" cy="172" rx="110" ry="13" fill="url(#r-shadow)"/>
  <!-- low rocky landmass base (mountains rise above as features) -->
  <path fill="url(#r-rock)" d="M34,168 C44,128 78,108 130,108 C182,108 216,128 226,168 Z"/>
  <!-- shaded right flank -->
  <path fill="#3c424e" fill-opacity="0.5" d="M132,168 C144,130 176,114 202,126 C218,142 222,156 226,168 Z"/>
  <!-- thin grass cap on the crest -->
  <path fill="url(#r-grass)" d="M86,118 C104,108 156,108 174,118 C156,126 104,126 86,118 Z"/>
</svg>
