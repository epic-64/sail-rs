<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 84" width="100" height="84">
  <!-- chest base -->
  <rect x="20" y="44" width="60" height="26" rx="3" fill="#6e4621" stroke="#3f2a14" stroke-width="3"/>
  <!-- domed lid -->
  <path d="M20 44 C20 24 80 24 80 44 Z" fill="#7d5026" stroke="#3f2a14" stroke-width="3" stroke-linejoin="round"/>
  <!-- gold glint between lid and base -->
  <rect x="22" y="42" width="56" height="4" fill="#ffdf6e"/>
  <!-- iron straps -->
  <g stroke="#d9b441" stroke-width="3.5" fill="none">
    <path d="M34 26 C33 36 33 60 34 70"/>
    <path d="M66 26 C67 36 67 60 66 70"/>
  </g>
  <!-- lock -->
  <rect x="45" y="48" width="10" height="11" rx="2" fill="#f0c94a" stroke="#3f2a14" stroke-width="2"/>
</svg>
