<svg xmlns="http://www.w3.org/2000/svg" width="150" height="160" viewBox="0 0 150 160">
  <defs>
    <linearGradient id="ru-stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8d2c2"/>
      <stop offset="1" stop-color="#a39c8a"/>
    </linearGradient>
  </defs>
  <!-- crumbled base / rubble -->
  <path fill="#8f8773" d="M8,160 C20,150 40,150 52,158 C66,150 90,150 104,158 C120,150 138,152 144,160 Z"/>
  <!-- left standing column (broken top) -->
  <path fill="url(#ru-stone)" d="M22,160 L22,64 L40,58 L40,160 Z"/>
  <path fill="#7d765f" fill-opacity="0.4" d="M33,160 L33,60 L40,58 L40,160 Z"/>
  <path fill="#cfc9b8" d="M18,66 L44,60 L40,52 L24,56 Z"/>
  <!-- broken lintel slumped between columns -->
  <path fill="url(#ru-stone)" d="M40,58 L96,50 L96,64 L40,72 Z"/>
  <path fill="#7d765f" fill-opacity="0.35" d="M40,64 L96,56 L96,64 L40,72 Z"/>
  <!-- right standing column (taller) -->
  <path fill="url(#ru-stone)" d="M96,160 L96,40 L116,34 L116,160 Z"/>
  <path fill="#7d765f" fill-opacity="0.45" d="M108,160 L108,37 L116,34 L116,160 Z"/>
  <path fill="#cfc9b8" d="M92,42 L120,36 L116,28 L98,32 Z"/>
  <!-- stray fallen block -->
  <rect x="118" y="142" width="22" height="18" rx="2" fill="url(#ru-stone)"/>
  <!-- cracks -->
  <g stroke="#7d765f" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M30,160 L31,90 L28,80"/>
    <path d="M104,150 L105,90 L108,70"/>
  </g>
</svg>
