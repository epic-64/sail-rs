<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="520" viewBox="0 0 2400 520" preserveAspectRatio="none">
  <defs>
    <!-- Floor wash: lit and warm at the helm under our feet, sinking into shade
         as the planks run away forward, so the deck reads with real depth. -->
    <linearGradient id="d-floor" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#9c6c3a"/>
      <stop offset="0.5" stop-color="#7e5430"/>
      <stop offset="1" stop-color="#5e3f23"/>
    </linearGradient>
    <!-- The deck floor: a straight-sided perspective trapezoid, full width at the
         helm under us and narrowing toward the bow. The viewBox is deliberately
         wide (2400x520) so that scaled to the viewport *height* the floor still
         reaches both screen edges — the ship never grows or shrinks with width. -->
    <clipPath id="floorClip">
      <path d="M0,520 L1120,150 L1280,150 L2400,520 Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#floorClip)">
    <rect x="0" y="120" width="2400" height="400" fill="url(#d-floor)"/>

    <!-- longitudinal plank seams, fanning from the bow vanishing point -->
    <g stroke="#3c2613" stroke-opacity="0.5" stroke-width="2.5">
      <line x1="200"  y1="520" x2="1200" y2="40"/>
      <line x1="400"  y1="520" x2="1200" y2="40"/>
      <line x1="600"  y1="520" x2="1200" y2="40"/>
      <line x1="800"  y1="520" x2="1200" y2="40"/>
      <line x1="1000" y1="520" x2="1200" y2="40"/>
      <line x1="1200" y1="520" x2="1200" y2="40"/>
      <line x1="1400" y1="520" x2="1200" y2="40"/>
      <line x1="1600" y1="520" x2="1200" y2="40"/>
      <line x1="1800" y1="520" x2="1200" y2="40"/>
      <line x1="2000" y1="520" x2="1200" y2="40"/>
      <line x1="2200" y1="520" x2="1200" y2="40"/>
    </g>
    <!-- a faint sheen on the lit side of every other seam -->
    <g stroke="#d8af74" stroke-opacity="0.20" stroke-width="1.4">
      <line x1="208"  y1="520" x2="1201" y2="41"/>
      <line x1="608"  y1="520" x2="1201" y2="41"/>
      <line x1="1008" y1="520" x2="1201" y2="41"/>
      <line x1="1408" y1="520" x2="1201" y2="41"/>
      <line x1="1808" y1="520" x2="1201" y2="41"/>
      <line x1="2208" y1="520" x2="1201" y2="41"/>
    </g>

    <!-- cross-plank breaks, spaced tighter toward the bow -->
    <g stroke="#3c2613" stroke-opacity="0.38" stroke-width="2.5">
      <line x1="0" y1="440" x2="2400" y2="440"/>
      <line x1="0" y1="350" x2="2400" y2="350"/>
      <line x1="0" y1="260" x2="2400" y2="260"/>
      <line x1="0" y1="195" x2="2400" y2="195"/>
    </g>

    <!-- shade hugging the two outer edges of the deck (the waterways) -->
    <path fill="none" stroke="#241608" stroke-opacity="0.32" stroke-width="22"
          d="M0,520 L1120,150 M1280,150 L2400,520"/>
  </g>

  <!-- a low grating hatch set into the deck just forward of the helm -->
  <g transform="translate(1200,470)">
    <polygon points="-150,38 150,38 96,-30 -96,-30" fill="#3c2613"/>
    <polygon points="-138,30 138,30 90,-22 -90,-22" fill="#6b4828"/>
    <g stroke="#3c2613" stroke-width="3" stroke-opacity="0.8">
      <line x1="-92" y1="-22" x2="-126" y2="30"/>
      <line x1="-46" y1="-22" x2="-63" y2="30"/>
      <line x1="0"   y1="-22" x2="0"   y2="30"/>
      <line x1="46"  y1="-22" x2="63"  y2="30"/>
      <line x1="92"  y1="-22" x2="126" y2="30"/>
      <line x1="-114" y1="-4" x2="114" y2="-4"/>
      <line x1="-126" y1="16" x2="126" y2="16"/>
    </g>
  </g>
</svg>
