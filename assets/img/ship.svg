<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="rs-hull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b421f"/>
      <stop offset="1" stop-color="#3c2410"/>
    </linearGradient>
    <linearGradient id="rs-sail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4ecd8"/>
      <stop offset="1" stop-color="#cfc2a4"/>
    </linearGradient>
  </defs>
  <!-- two masts -->
  <rect x="72" y="40" width="4" height="118" fill="#5a3a1c"/>
  <rect x="124" y="30" width="4.5" height="128" fill="#5a3a1c"/>
  <!-- yards -->
  <rect x="50" y="56" width="48" height="3" fill="#4a2f17"/>
  <rect x="100" y="46" width="54" height="3" fill="#4a2f17"/>
  <!-- bellied square sails -->
  <path fill="url(#rs-sail)" d="M52,58 C66,74 82,74 96,58 C92,92 56,92 52,58 Z"/>
  <path fill="url(#rs-sail)" d="M101,48 C118,66 136,66 153,48 C148,86 106,86 101,48 Z"/>
  <!-- a small jib at the bow -->
  <path fill="url(#rs-sail)" fill-opacity="0.92" d="M150,60 L176,150 L150,150 Z"/>
  <!-- hull: a long carrack with a raised stern castle -->
  <path fill="url(#rs-hull)" d="M22,150
    C26,150 32,150 40,150 L168,150
    C176,150 182,156 180,166 L178,170
    C172,182 150,186 116,186 L66,186
    C44,186 30,178 24,166 L20,156
    C18,152 19,150 22,150 Z"/>
  <!-- a stripe of gunports along the hull -->
  <g fill="#1f1208" opacity="0.7">
    <rect x="46" y="162" width="7" height="7"/>
    <rect x="66" y="163" width="7" height="7"/>
    <rect x="86" y="164" width="7" height="7"/>
    <rect x="106" y="164" width="7" height="7"/>
    <rect x="126" y="163" width="7" height="7"/>
    <rect x="146" y="162" width="7" height="7"/>
  </g>
  <!-- raised stern castle at the bow side -->
  <path fill="#4a2f17" d="M150,150 L172,150 C178,150 182,154 180,162 L162,162 C154,162 150,156 150,150 Z"/>
  <!-- a pennant atop the foremast -->
  <path fill="#b23a2e" d="M126.5,30 L150,34 L126.5,40 Z"/>
</svg>
