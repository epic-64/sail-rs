<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>sail-rs</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #05121c;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            outline: none;
            /* Mobile: let the game own every touch. Without this the browser
               eats drags as scroll/zoom and the steering wheel won't work. */
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #cbe3f2;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            background: #05121c;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="loading">Hoisting sail&hellip;</div>
    <canvas id="glcanvas" tabindex="1"></canvas>
    <script src="mq_js_bundle.js"></script>
    <script>
        // localStorage bridge for the voyage save (see src/save.rs). Registered as a
        // miniquad plugin so its three shims are added to the wasm import object
        // before the module is instantiated. Strings cross as (ptr, len) into wasm
        // memory; `_get` writes the value back into a Rust-owned buffer and returns
        // its byte length (or -1 if the key is absent), so no allocator is shared.
        miniquad_add_plugin({
            register_plugin: function (importObject) {
                function mqstr(ptr, len) {
                    return new TextDecoder("utf-8").decode(
                        new Uint8Array(wasm_memory.buffer, ptr, len)
                    );
                }
                importObject.env.localstorage_set = function (kp, kl, vp, vl) {
                    try {
                        window.localStorage.setItem(mqstr(kp, kl), mqstr(vp, vl));
                    } catch (e) {}
                };
                importObject.env.localstorage_get = function (kp, kl, op, oc) {
                    let v = null;
                    try {
                        v = window.localStorage.getItem(mqstr(kp, kl));
                    } catch (e) {}
                    if (v === null || v === undefined) return -1;
                    const bytes = new TextEncoder().encode(v);
                    const n = Math.min(bytes.length, oc);
                    new Uint8Array(wasm_memory.buffer, op, n).set(bytes.subarray(0, n));
                    return n;
                };
                importObject.env.localstorage_remove = function (kp, kl) {
                    try {
                        window.localStorage.removeItem(mqstr(kp, kl));
                    } catch (e) {}
                };
            },
            version: "0.1.0",
            name: "sailrs_localstorage",
        });

        // Hide the loading splash once the wasm module has booted.
        const _loading = document.getElementById("loading");
        const _obs = setInterval(() => {
            if (window.wasm_exports) {
                if (_loading) _loading.style.display = "none";
                clearInterval(_obs);
            }
        }, 100);
        load("sail-rs.wasm");
        // Keep keyboard focus on the canvas so controls work immediately.
        document.getElementById("glcanvas").focus();
    </script>
</body>
</html>
